<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" role="img" aria-label="Shopsugi Logo">
  <title>Shopsugi</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500');
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;1,800');

      .logo-text {
        font-family: 'Playfair Display', serif;
        font-weight: 800;
        fill: #FDFAF5;
        font-size: 26px;
        letter-spacing: -0.01em;
      }
      .logo-symbol {
        font-family: 'DM Sans', sans-serif;
        font-weight: 500;
        fill: url(#gold-gradient);
        font-size: 20px;
        animation: floatSymbol 6s ease-in-out infinite;
      }
      .logo-path {
        stroke: #FDFAF5;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .logo-gold {
        stroke: url(#gold-gradient);
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .logo-gold-fill {
        fill: url(#gold-gradient);
      }

      @keyframes drawCrack {
        to { stroke-dashoffset: 0; }
      }
      @keyframes shimmerPulse {
        0%, 100% { opacity: 0.6; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.1); }
      }
      @keyframes floatSymbol {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }

      .kintsugi-main-crack {
        stroke-width: 1.5;
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: drawCrack 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.2s;
      }

      .kintsugi-branch-crack {
        stroke-width: 1;
        stroke-dasharray: 15;
        stroke-dashoffset: 15;
        animation: drawCrack 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.0s;
      }

      .gold-dust-1 {
        animation: shimmerPulse 3.5s ease-in-out infinite 1s;
        transform-origin: 28px 16px;
      }
      .gold-dust-2 {
        animation: shimmerPulse 4.2s ease-in-out infinite 2s;
        transform-origin: 31px 24px;
      }

      @media (prefers-reduced-motion: reduce) {
        .kintsugi-main-crack, .kintsugi-branch-crack {
          stroke-dashoffset: 0;
          animation: none;
        }
        .gold-dust-1, .gold-dust-2, .logo-symbol {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>

    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C29A30" />
      <stop offset="35%" stop-color="#A67C1F" />
      <stop offset="50%" stop-color="#F5EFE0" />
      <stop offset="65%" stop-color="#A67C1F" />
      <stop offset="100%" stop-color="#8A6416" />
    </linearGradient>
  </defs>

  <g transform="translate(4, 6)">
    <ellipse cx="20" cy="10" rx="16" ry="3" class="logo-path" />
    <path d="M 4 10 C 4 30, 12 36, 20 36 C 28 36, 36 30, 36 10" class="logo-path" />
    <path d="M 12 11.5 L 16 18 L 14 24 L 21 35.5" class="logo-gold kintsugi-main-crack" />
    <path d="M 16 18 L 22 16" class="logo-gold kintsugi-branch-crack" />
    <circle cx="28" cy="16" r="1.2" class="logo-gold-fill gold-dust-1" />
    <circle cx="31" cy="24" r="0.8" class="logo-gold-fill gold-dust-2" />
  </g>

  <g transform="translate(52, 34)">
    <text x="0" y="0" class="logo-text">Shopsugi</text>
    <text x="110" y="-4" class="logo-symbol">ツ</text>
  </g>
</svg>
